<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Practice 1</title>
    <style>
        body{
            background-color: black;
            font-size: larger;
            color:white;
            
        }
        .container{
            width: 800px;
            height: 500px;
            display:grid;
            grid-template-rows:repeat(2,1fr) , 0.5fr , 1fr;
            grid-template-columns:1fr 1fr 0.5fr 1fr 1fr;
            gap:10px;
            margin:100px auto;
        }
        .box1{
            background-color: rgb(224, 106, 106);
            grid-row-start:1;
            grid-row-end:3;
            grid-column-start:1;
            grid-column-end:2;
        }
        .box2{
            background-color: rgb(222, 238, 0);
            grid-column:2/4;
            grid-row:1/2;
            
        }
        .box3{
            background-color: rgb(0, 255, 115);
            grid-column:4/6;
            grid-row:1/2;
        }
        .box4{
            background-color: rgb(36, 27, 121);
            grid-row:2/4;
            grid-column:2/3;
        }
        .box5{
            background-color: rgb(151, 20, 140);
            grid-column:3/5;
            grid-row:2/4;
        }
        .box6{
            background-color: rgb(135, 163, 59);
            grid-row:2/5;
            grid-column:5/6;
            
        }
        .box7{
            background-color: rgb(0, 1, 73);
            grid-row:3/5;
            grid-column:1/2;
            
        }
        .box8{
            background-color: rgb(5, 56, 0);
            grid-row:4/5;
            grid-column:2/4;
            
        }
        .box9{
            background-color: rgb(0, 78, 92);
            grid-row:4/5;
            grid-column:4/5;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box box1">Box - 1 </div>
        <div class="box box2">Box - 2 </div>
        <div class="box box3">Box - 3 </div>
        <div class="box box4">Box - 4 </div>
        <div class="box box5">Box - 5 </div>
        <div class="box box6">Box - 6 </div>
        <div class="box box7">Box - 7 </div>
        <div class="box box8">Box - 8 </div>
        <div class="box box9">Box - 9 </div>
    </div>
</body>
</html>
